services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: tokovo-postiz
    restart: unless-stopped
    env_file:
      - ./postiz.env
    environment:
      DATABASE_URL: postgresql://${POSTIZ_DB_USER}:${POSTIZ_DB_PASSWORD}@postiz-postgres:5432/${POSTIZ_DB_NAME}
      REDIS_URL: redis://postiz-redis:6379
      BACKEND_INTERNAL_URL: http://localhost:3000
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - '${POSTIZ_PUBLIC_PORT:-4007}:5000'
    volumes:
      - postiz-config:/config
      - postiz-uploads:/uploads
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - postiz-network
      - temporal-network

  postiz-postgres:
    image: postgres:17-alpine
    container_name: tokovo-postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTIZ_DB_USER}
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD}
      POSTGRES_DB: ${POSTIZ_DB_NAME}
    volumes:
      - postiz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTIZ_DB_USER} -d ${POSTIZ_DB_NAME}']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - postiz-network

  postiz-redis:
    image: redis:7.2
    container_name: tokovo-postiz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - postiz-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - postiz-network

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: tokovo-postiz-temporal-elasticsearch
    restart: unless-stopped
    environment:
      cluster.routing.allocation.disk.threshold_enabled: 'true'
      cluster.routing.allocation.disk.watermark.low: 512mb
      cluster.routing.allocation.disk.watermark.high: 256mb
      cluster.routing.allocation.disk.watermark.flood_stage: 128mb
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: 'false'
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - temporal-network

  temporal-postgresql:
    image: postgres:16
    container_name: tokovo-postiz-temporal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - temporal-network

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: tokovo-postiz-temporal
    restart: unless-stopped
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
      ENABLE_ES: 'true'
      ES_SEEDS: temporal-elasticsearch
      ES_VERSION: v7
      TEMPORAL_NAMESPACE: default
    ports:
      - '7233:7233'
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - temporal-network

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    container_name: tokovo-postiz-temporal-admin
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    stdin_open: true
    tty: true
    networks:
      - temporal-network

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: tokovo-postiz-temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://127.0.0.1:3001,http://localhost:3001
    ports:
      - '${TEMPORAL_UI_PORT:-8080}:8080'
    networks:
      - temporal-network

volumes:
  postiz-config:
  postiz-uploads:
  postiz-postgres-data:
  postiz-redis-data:
  temporal-postgres-data:
  temporal-elasticsearch-data:

networks:
  postiz-network:
  temporal-network:
