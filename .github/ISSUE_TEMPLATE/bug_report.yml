name: Bug report
description: Report a reproducible Tokovo issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, episode ID, package, or command that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version Or Commit
      placeholder: v1.0.0, commit SHA, or branch
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, browser, Remotion version if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      render: shell
